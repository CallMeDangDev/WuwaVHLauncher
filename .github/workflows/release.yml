name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish (single-file, self-contained)
        run: |
          dotnet publish WuwaVHLauncher.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o ./publish

      - name: Create ZIP archive
        run: Compress-Archive -Path ./publish/WuwaVHLauncher.exe -DestinationPath ./WuwaVHLauncher-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WuwaVHLauncher ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ./WuwaVHLauncher-${{ github.ref_name }}.zip
