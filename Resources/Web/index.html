<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wuthering Waves - Việt Hoá Launcher</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background Video Layer -->
    <div class="bg-layer">
        <video id="bgVideo" muted loop playsinline preload="auto">
            <!-- src set by JS once asset is downloaded to AppData cache -->
        </video>
        <div class="bg-vignette"></div>
    </div>

    <!-- Floating Particles -->
    <canvas id="particleCanvas"></canvas>

    <!-- ===== TOP BAR ===== -->
    <header class="top-bar" id="topBar">
        <div class="top-bar__left">
            <img src="assets/logo.png" alt="Wuthering Waves" class="top-bar__logo" draggable="false">
        </div>
        <nav class="top-nav" id="topNav">
            <button class="top-nav__item active" data-page="home">HOME</button>
            <button class="top-nav__item" data-page="font-creator">FONT CREATOR</button>
            <div class="top-nav__indicator" id="topNavIndicator">
                <canvas id="navWaveCanvas"></canvas>
            </div>
        </nav>
        <div class="top-bar__right">
            <button class="top-bar__btn" id="btnMinimize" title="Thu nhỏ">
                <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19 13H5v-2h14v2z"/></svg>
            </button>
            <button class="top-bar__btn top-bar__btn--close" id="btnClose" title="Đóng">
                <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
    </header>

    <!-- ===== RIGHT PANEL ===== -->
    <aside class="right-panel" id="rightPanel">

        <!-- Asset status / download progress (where folder picker was) -->
        <div class="rp-status" id="rpStatus" style="display:none;">
            <div class="rp-status__row">
                <span class="rp-status__text" id="rpStatusText">Đang kiểm tra cập nhật...</span>
                <span class="rp-status__pct"  id="mediaProgressPct"></span>
            </div>
            <div class="progress__track rp-status__bar" id="mediaProgressBar" style="display:none;">
                <div class="progress__fill" id="mediaProgressFill"></div>
            </div>
            <div class="rp-status__foot" id="mediaProgressSize"></div>
        </div>

        <!-- Install progress (existing feature) -->
        <div class="progress" id="progressSection" style="display:none;">
            <div class="progress__head"><span id="progressText">Đang tải...</span><span id="progressPct">0%</span></div>
            <div class="progress__track"><div class="progress__fill" id="progressFill"></div></div>
            <div class="progress__foot"><span id="progressSpeed"></span><span id="progressSize"></span></div>
        </div>

        <!-- Dropdown menu (opens above the actions row) -->
        <div class="rp-dropdown" id="rpDropdown">
            <button class="rp-dropdown__item" id="menuGameDir">
                <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                Thư mục game
            </button>
            <button class="rp-dropdown__item" id="menuCheckUpdate">
                <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
                Kiểm tra cập nhật
            </button>
            <button class="rp-dropdown__item" id="menuForceQuit">
                <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                Buộc thoát game
            </button>
            <button class="rp-dropdown__item" id="menuRestartAdmin">
                <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/></svg>
                Khởi động với Admin
            </button>
            <div class="rp-dropdown__sep"></div>
            <button class="rp-dropdown__item rp-dropdown__item--danger" id="menuUninstall">
                <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                Gỡ cài đặt Việt Hoá
            </button>
        </div>

        <!-- Actions row: hamburger + start button -->
        <div class="rp-actions">
            <button class="rp-menu__btn" id="btnMenu" title="Menu">
                <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <button class="start-btn" id="btnStart">
                <span class="start-btn__shine"></span>
                <span class="start-btn__label" id="startBtnText">Cài Việt Hoá</span>
            </button>
        </div>

        <!-- Version display -->
        <div class="rp-version">
            <span id="verApp"></span>
            <span id="verVH"></span>
        </div>

    </aside>



    <!-- ===== FONT CREATOR PAGE ===== -->
    <div id="pageFontCreator" class="page-overlay" style="display:none;">
        <div class="fc-card">
            <div class="fc-card__icon">
                <svg viewBox="0 0 24 24" width="48" height="48"><path fill="currentColor" opacity="0.9" d="M9.6 14L12 7.2 14.4 14M11 5L5.5 19h2.2l1.1-3H15l1.1 3h2.2L13 5h-2z"/></svg>
            </div>
            <h2 class="fc-card__title">Font Creator</h2>
            <p class="fc-card__desc">Công cụ tạo font Việt Hoá<br>sẽ sớm ra mắt...</p>
        </div>
    </div>

    <!-- ===== AUDIO PLAYER ===== -->
    <div class="audio-player" id="audioPlayer">
        <div class="ap-art">
            <svg class="ap-art__icon" viewBox="0 0 24 24" width="28" height="28">
                <path fill="currentColor" d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
            </svg>
            <div class="ap-viz" id="apViz">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
        </div>
        <div class="ap-body">
            <div class="ap-meta">
                <div class="ap-meta__title">Wuthering Waves OST</div>
                <div class="ap-meta__artist">Background Music</div>
            </div>
            <div class="ap-progress">
                <span class="ap-time" id="apCur">0:00</span>
                <div class="ap-track" id="apTrack">
                    <div class="ap-track__fill" id="apFill"></div>
                </div>
                <span class="ap-time ap-time--dur" id="apDur">--:--</span>
            </div>
            <div class="ap-controls">
                <button class="ap-btn ap-btn--sm" id="apShuffle" title="Shuffle">
                    <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
                </button>
                <button class="ap-btn" id="apPrev" title="Trước">
                    <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="ap-btn ap-btn--play" id="apPlay" title="Phát / Dừng">
                    <svg id="apIconPlay"  viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
                    <svg id="apIconPause" viewBox="0 0 24 24" width="20" height="20" style="display:none"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="ap-btn" id="apNext" title="Tiếp">
                    <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
                <button class="ap-btn ap-btn--sm ap-btn--active" id="apRepeat" title="Lặp lại">
                    <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                </button>
            </div>
            <!-- Volume row -->
            <div class="ap-vol">
                <button class="ap-btn ap-btn--sm" id="apVolBtn" title="Tắt / Bật tiếng">
                    <svg id="apVolIcon" viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
                <div class="ap-vol__track">
                    <input type="range" class="ap-vol__slider" id="apVolSlider"
                           min="0" max="100" value="35" step="1">
                    <div class="ap-vol__fill" id="apVolFill" style="width:35%"></div>
                </div>
                <span class="ap-vol__label" id="apVolLabel">35</span>
            </div>
        </div>
    </div>

    <div id="toasts"></div>

    <!-- ===== CONFIRM MODAL ===== -->
    <div id="confirmModal" class="modal-backdrop" style="display:none;">
        <div class="modal-box">
            <div class="modal-title">
                <svg viewBox="0 0 24 24" width="18" height="18" style="flex-shrink:0"><path fill="#E8C45A" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                <span>Xác nhận</span>
            </div>
            <div class="modal-sep"></div>
            <p class="modal-msg" id="modalMsg"></p>
            <div class="modal-actions">
                <button class="modal-btn modal-btn--cancel" id="modalCancel">Huỷ</button>
                <button class="modal-btn modal-btn--ok" id="modalOk">Xác nhận</button>
            </div>
        </div>
    </div>
    <audio id="bgMusic" loop preload="auto">
        <!-- src set by JS once asset is downloaded to AppData cache -->
    </audio>
    <script src="script.js"></script>
</body>
</html>
